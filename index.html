<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="style.css">
    <title>ONIX Humanoid</title>
</head>

<body onclick="goFullScreen(); closePanelExternal(event)">

    <button id="menu-switch" onclick="event.stopPropagation(); togglePanel();">⋮</button>

    <div class="face-container">
        <div class="eyes">
            <div class="eye left"></div>
            <div class="eye right"></div>
        </div>
        <div class="mouth"></div>
    </div>

    <div id="control-panel" class="controls-panel" onclick="event.stopPropagation();">
        <div class="panel-content">
            <button class="close-btn" onclick="togglePanel()">✕ CLOSE</button>
            
            <h3 style="color:#0ff; text-align:center; margin-bottom:10px; margin-top:20px;">ONIX COMMANDS</h3>
            
            <button onclick="sendCommand('ON')">POWER ON</button>
            <button onclick="sendCommand('OFF')">SHUTDOWN</button>
            <button onclick="sendCommand('SLEEP')">SLEEP</button>
            <button onclick="sendCommand('WAKE')">WAKE UP</button>
            
            <div style="display:flex; gap:10px;">
                <button style="flex:1" onclick="switchCamera('user')">FRONT</button>
                <button style="flex:1" onclick="switchCamera('environment')">BACK</button>
            </div>
            
            <video id="videoFeed" autoplay playsinline muted></video>
        </div>
    </div>

    <script src="app.js"></script>
    
    <script>
        function goFullScreen() {
            let elem = document.documentElement;
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch((err) => {
                    console.log(`Error: ${err.message}`);
                });
            }
        }

        // Panel ke bahar click karne par band karne ka logic
        function closePanelExternal(event) {
            const panel = document.getElementById('control-panel');
            if (panel.classList.contains('panel-active')) {
                panel.classList.remove('panel-active');
            }
        }
    </script>
</body>
</html>
