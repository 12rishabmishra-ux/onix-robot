<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="style.css">
    <title>ONIX</title>
</head>
<body onclick="goFullScreen()">

    <button id="menu-switch" onclick="event.stopPropagation(); togglePanel();">⋮</button>

    <div class="face-container">
        <div class="eyes">
            <div class="eye left"></div>
            <div class="eye right"></div>
        </div>
        <div class="mouth"></div>
    </div>

    <div id="control-panel" class="controls-panel" onclick="event.stopPropagation();">
        <div class="panel-content">
            <button onclick="sendCommand('ON')">POWER ON</button>
            <button onclick="sendCommand('OFF')">SHUTDOWN</button>
            <button onclick="sendCommand('SLEEP')">SLEEP</button>
            <button onclick="sendCommand('WAKE')">WAKE UP</button>
            <button onclick="switchCamera('user')">FRONT CAM</button>
            <button onclick="switchCamera('environment')">BACK CAM</button>
            <video id="videoFeed" autoplay playsinline muted></video>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // FULLSCREEN API: Browser ke bars hatane ka asook tareeka
        function goFullScreen() {
            let elem = document.documentElement;
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch((err) => {
                    console.log("Error attempting to enable fullscreen:", err);
                });
            }
        }
    </script>
</body>
</html>
