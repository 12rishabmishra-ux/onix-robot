<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="style.css">
    <title>ONIX Humanoid</title>
</head>

<body onclick="goFullScreen()">

    <button id="menu-switch" onclick="event.stopPropagation(); togglePanel();">⋮</button>

    <div class="face-container">
        <div class="eyes">
            <div class="eye left"></div>
            <div class="eye right"></div>
        </div>
        <div class="mouth"></div>
    </div>

    <div id="control-panel" class="controls-panel" onclick="event.stopPropagation();">
        <div class="panel-content">
            <h3 style="color:#0ff; text-align:center; margin-bottom:10px;">ONIX COMMANDS</h3>
            <button onclick="sendCommand('ON')">POWER ON</button>
            <button onclick="sendCommand('OFF')">SHUTDOWN</button>
            <button onclick="sendCommand('SLEEP')">SLEEP</button>
            <button onclick="sendCommand('WAKE')">WAKE UP</button>
            <div style="display:flex; gap:10px;">
                <button style="flex:1" onclick="switchCamera('user')">FRONT CAM</button>
                <button style="flex:1" onclick="switchCamera('environment')">BACK CAM</button>
            </div>
            <video id="videoFeed" autoplay playsinline muted></video>
        </div>
    </div>

    <script src="app.js"></script>
    
    <script>
        // BROWSER BARS KO HATANE WALA MAGIC FUNCTION
        function goFullScreen() {
            let elem = document.documentElement;
            // Agar fullscreen nahi hai toh fullscreen request karo
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch((err) => {
                    console.log(`Error: ${err.message}`);
                });
            }
        }

        // Android par navigation bar hide karne ke liye
        window.addEventListener("load", function() {
            setTimeout(function() {
                window.scrollTo(0, 1);
            }, 0);
        });
    </script>
</body>
</html>
